name: Weekly Food Reminder

on:
  schedule:
    - cron: '30 11 * * 1'
    - cron: '30 11 * * 2'
    - cron: '0 1 * * 3'
  workflow_dispatch:

jobs:
  remind-monday:
    if: github.event.schedule == '30 11 * * 1' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - run: pip install requests
      - name: Send Monday message
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python -c "import os, requests; requests.post(f'https://api.telegram.org/bot{os.environ[\"TELEGRAM_TOKEN\"]}/sendMessage', json={'chat_id': os.environ['CHAT_ID'], 'text': '🍔 رزرو غذای هفته آینده فراموش نشود'})"

  remind-tuesday:
    if: github.event.schedule == '30 11 * * 2' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - run: pip install requests
      - name: Send Tuesday message
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python -c "import os, requests; requests.post(f'https://api.telegram.org/bot{os.environ[\"TELEGRAM_TOKEN\"]}/sendMessage', json={'chat_id': os.environ['CHAT_ID'], 'text': 'آخرین فرصت رزرو غذاست'})"

  remind-wednesday:
    if: github.event.schedule == '0 1 * * 3' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - run: pip install requests
      - name: Send Wednesday message
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python -c "import os, requests; requests.post(f'https://api.telegram.org/bot{os.environ[\"TELEGRAM_TOKEN\"]}/sendMessage', json={'chat_id': os.environ['CHAT_ID'], 'text': 'خاک تو سرت اگه یادت رفته بازهم'})"
