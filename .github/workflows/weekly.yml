name: Weekly Food Reminder

on:
  schedule:
    - cron: '30 10 * * 1'
    - cron: '30 10 * * 2'
    - cron: '10 0 * * 3'
  workflow_dispatch:

jobs:
  remind-monday:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - run: pip install requests
      - name: Send Monday message
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          MESSAGE_TEXT: "🍔 رزرو غذای هفته آینده فراموش نشود"
        run: python bot.py

  remind-tuesday:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - run: pip install requests
      - name: Send Tuesday message
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          MESSAGE_TEXT: "آخرین فرصت رزرو غذاست"
        run: python bot.py

  remind-wednesday:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - run: pip install requests
      - name: Send Wednesday message
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          MESSAGE_TEXT: "خاک تو سرت اگه یادت رفته بازهم"
        run: python bot.py
